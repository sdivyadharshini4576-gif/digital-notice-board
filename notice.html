<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Notice Board</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f2f2f2;
margin:0;
padding:0;
}

header{
background:#003366;
color:white;
padding:15px;
text-align:center;
}

.container{
width:90%;
max-width:800px;
margin:20px auto;
}

input,select{
width:100%;
padding:10px;
margin:8px 0;
}

button{
padding:10px 15px;
background:#007bff;
color:white;
border:none;
cursor:pointer;
margin:5px;
}

button:hover{
background:#0056b3;
}

.notice{
background:white;
padding:15px;
margin-top:15px;
border-left:6px solid blue;
border-radius:5px;
}

.dark{
background:#222;
color:white;
}

.dark .notice{
background:#333;
color:white;
}

footer{
text-align:center;
margin-top:20px;
padding:10px;
background:#003366;
color:white;
}
</style>
</head>

<body>

<header>
<h1>Smart Digital Notice Board</h1>
<p id="time"></p>
</header>

<div class="container">

<h2>Admin Login</h2>

<input type="text" id="user" placeholder="Username">
<input type="password" id="pass" placeholder="Password">
<button onclick="login()">Login</button>

<hr>

<h2>Add Notice</h2>

<input type="text" id="title" placeholder="Notice Title">

<select id="category">
<option>General</option>
<option>Exam</option>
<option>Placement</option>
<option>Event</option>
</select>

<input type="text" id="message" placeholder="Notice Message">

<input type="file" id="image">

<input type="file" id="pdf">

<button onclick="addNotice()">Add Notice</button>

<hr>

<input type="text" id="search" placeholder="Search Notice" onkeyup="searchNotice()">

<button onclick="darkMode()">Dark Mode</button>

<h2>Latest Notices</h2>

<div id="board"></div>

</div>

<footer>
Digital Notice Board Mini Project
</footer>

<script>

let board=document.getElementById("board");

function login(){

let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;

if(u=="admin" && p=="1234"){
alert("Login Successful");
}
else{
alert("Wrong Username or Password");
}
}

function addNotice(){

let title=document.getElementById("title").value;
let msg=document.getElementById("message").value;
let cat=document.getElementById("category").value;

if(title=="" || msg==""){
alert("Enter Details");
return;
}

let div=document.createElement("div");

div.className="notice";

div.innerHTML=
"<h3>"+title+"</h3>"+
"<p><b>Category:</b> "+cat+"</p>"+
"<p>"+msg+"</p>"+
"<button onclick='this.parentElement.remove()'>Delete</button>";

board.prepend(div);

document.getElementById("title").value="";
document.getElementById("message").value="";
}

function searchNotice(){

let input=document.getElementById("search").value.toLowerCase();

let notices=document.getElementsByClassName("notice");

for(let i=0;i<notices.length;i++){

if(notices[i].innerText.toLowerCase().includes(input))
notices[i].style.display="block";

else
notices[i].style.display="none";

}

}

function darkMode(){
document.body.classList.toggle("dark");
}

setInterval(function(){

let d=new Date();

document.getElementById("time").innerHTML=d.toLocaleString();

},1000);

</script>

</body>
</html>
